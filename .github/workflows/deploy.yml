name: "Deploy DeployHistory"

on:
  schedule:
    - cron: "0 * * * *" # every 1 hour
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          path: main-repo

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Prepare output folder
        run: mkdir -p main-repo/output

      - name: Run DeployHistory Parser
        run: python scripts/deployhistory.py
        working-directory: main-repo

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy generated files and commit
        run: |
          cp -r main-repo/output/* gh-pages/
          cd gh-pages
          git config user.email "bot@local"
          git config user.name "bot"
          git add .
          git diff --cached --quiet || (
            git commit -m "Update version history"
            git push
          )

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
