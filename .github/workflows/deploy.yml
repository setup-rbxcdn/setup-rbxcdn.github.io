name: "Re-Deploy DeployHistory"

on:
  schedule:
    - cron: "0 * * * *" # every 1 hour
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout main, generate files
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Run DeployHistory Parser
        run: python scripts/deployhistory.py

      - name: Commit changes
        run: |
          git config user.email "bot@local"
          git config user.name "bot"
          git add .
          git diff --cached --quiet || (
            git commit -m "Update version history"
            git push
          )
