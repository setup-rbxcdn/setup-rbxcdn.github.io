name: "Deploy DeployHistory"

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch DeployHistory
        run: |
          curl -s -H "Cache-Control: no-cache" https://setup.rbxcdn.com/DeployHistory.txt -o DeployHistory.txt

      - name: Commit & push if changed
        run: |
          git config user.email "bot@local"
          git config user.name "bot"

          git add DeployHistory.txt
          git diff --cached --quiet || (
            git commit -m "Update DeployHistory"
            git push
          )

  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
