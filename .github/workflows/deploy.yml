name: "Deploy DeployHistory"

on:
  schedule:
    - cron: "0 * * * *"  # every 1 hour
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch (for script)
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run DeployHistory Parser
        run: |
          python scripts/deployhistory.py  # adjust path if needed

      - name: Commit generated JSON to gh-pages
        run: |
          git config user.email "bot@local"
          git config user.name "bot"

          git checkout gh-pages
          cp -r version-history/* .   # copy generated files into root of gh-pages
          git add .
          git diff --cached --quiet || (
            git commit -m "Update version history"
            git push
          )

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4